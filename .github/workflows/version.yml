name: Version

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type (major/minor/patch/conventional) or \"skip\""
        required: false
        default: "skip"

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    concurrency:
      group: version-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check if version bump needed
        id: check
        run: |
          # Get latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            # First release: check all commits to determine initial version
            # This will create the first version tag based on all historical commits
            COMMITS=$(git log --oneline | grep -v "\[skip ci\]" | wc -l | tr -d ' ')
            echo "commits=$COMMITS" >> $GITHUB_OUTPUT
            echo "tag=none" >> $GITHUB_OUTPUT
          else
            # Check commits since last tag, filtering out [skip ci] commits
            # [skip ci] commits are typically docs-only changes that shouldn't trigger releases
            COMMITS=$(git log --oneline $LATEST_TAG..HEAD | grep -v "\[skip ci\]" | wc -l | tr -d ' ')
            echo "commits=$COMMITS" >> $GITHUB_OUTPUT
            echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          fi

          echo "Commits to process: $COMMITS"

      - name: Resolve release type
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE="${{ github.event.inputs.version }}"
            if [ -z "$RELEASE" ]; then
              RELEASE="skip"
            fi
          else
            # Push to main: derive bump from conventional commits (non-interactive)
            RELEASE="conventional"
          fi

          case "$RELEASE" in
            skip|major|minor|patch|premajor|preminor|prepatch|prerelease|conventional) ;;
            *)
              # Allow explicit semver like 1.2.3
              if ! echo "$RELEASE" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
                echo "Invalid release type/version: $RELEASE"
                exit 1
              fi
              ;;
          esac

          echo "release=$RELEASE" >> $GITHUB_OUTPUT
          echo "Resolved release type: $RELEASE"

      - name: Bump version
        if: steps.check.outputs.commits != '0' && steps.release.outputs.release != 'skip'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          RELEASE="${{ steps.release.outputs.release }}"
          # --release is required for non-interactive CI: without it, bumpp opens a
          # picker even with --yes and never commits/tags (see v0.9.0 release notes).
          BUMP_CMD=(
            bunx bumpp
            --yes
            --commit "chore: release v%s"
            --tag "v%s"
            --push
            --release "$RELEASE"
          )

          printf "Running:"
          printf " %q" "${BUMP_CMD[@]}"
          echo
          "${BUMP_CMD[@]}"

      - name: Verify version consistency
        if: steps.check.outputs.commits != '0' && steps.release.outputs.release != 'skip'
        run: |
          # Ensure the created tag matches package.json version
          TAG_VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          JSON_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$JSON_VERSION" ]; then
            echo "Version mismatch: tag=$TAG_VERSION, package.json=$JSON_VERSION"
            exit 1
          fi
          echo "Version consistency verified: $TAG_VERSION"

      - name: Output result
        run: |
          if [ "${{ steps.check.outputs.commits }}" == "0" ]; then
            echo "No commits to process (all have [skip ci])"
          elif [ "${{ steps.release.outputs.release }}" == "skip" ]; then
            echo "Versioning skipped via workflow_dispatch"
          else
            echo "Version bumped successfully (${{ steps.release.outputs.release }})"
          fi

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Run Biome checks
        run: bun run check

      - name: Run TypeScript checks
        run: bun run typecheck

      - name: Run unit tests
        run: bun test src

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build standalone CLI
        run: bun run build

      - name: Run e2e tests against compiled binary
        run: AI_LAUNCHER_BIN=./dist/ai bun test e2e

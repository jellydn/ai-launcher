# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-added-large-files" },
]

[[repos]]
repo = "local"
hooks = [
    { id = "typecheck", name = "TypeScript type checking", entry = "bun run typecheck", language = "system", pass_filenames = false },
    { id = "biome-check", name = "Biome lint and format", entry = "bun run check", language = "system", files = "\\.ts$" },
]
